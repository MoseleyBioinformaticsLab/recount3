name: Run Tests

on:
  workflow_call:
    inputs:
      install_command:
        description: Install command for Linux (full extras, including bigwig and biocpy).
        required: true
        type: string
      install_command_macos:
        description: >-
          Install command for macOS. Omits the bigwig extra (pyBigWig has no
          reliable macOS wheel); the BiocPy stack builds from source there.
        required: false
        type: string
        default: 'python -m pip install -e ".[dev,biocpy]"'
      install_command_windows:
        description: >-
          Install command for Windows. Core only: neither pyBigWig nor the BiocPy
          ranged stack (iranges/genomicranges) provides Windows wheels, and the
          latter fails to build from source. BiocPy-dependent tests skip there.
        required: false
        type: string
        default: 'python -m pip install -e ".[dev]"'

jobs:
  run-tests:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        os: [ubuntu-latest]
        include:
          - os: windows-latest
            python-version: "3.10"
          - os: windows-latest
            python-version: "3.14"
          - os: macos-latest
            python-version: "3.10"
          - os: macos-latest
            python-version: "3.14"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package (Linux, full extras)
        if: runner.os == 'Linux'
        uses: Wandalen/wretry.action@master
        with:
          command: |
            python -m pip install --upgrade pip
            ${{ inputs.install_command }}
          attempt_limit: 5
          attempt_delay: 10000
      - name: Install package (macOS, no bigwig)
        if: runner.os == 'macOS'
        uses: Wandalen/wretry.action@master
        with:
          command: |
            python -m pip install --upgrade pip
            ${{ inputs.install_command_macos }}
          attempt_limit: 5
          attempt_delay: 10000
      - name: Install package (Windows, core only)
        if: runner.os == 'Windows'
        uses: Wandalen/wretry.action@master
        with:
          command: |
            python -m pip install --upgrade pip
            ${{ inputs.install_command_windows }}
          attempt_limit: 5
          attempt_delay: 10000
      - name: Run tests
        run: python -m pytest
